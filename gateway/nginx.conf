server {
    listen 8080;

    # Frontend — SPA fallback
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # user-service — Auth endpoints
    location /api/auth {
        proxy_pass http://user-service:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # user-service — Users endpoints
    location /api/users {
        proxy_pass http://user-service:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # friend-service
    location /api/friends {
        proxy_pass http://friend-service:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # message-service — Messages
    location /api/messages {
        proxy_pass http://message-service:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # message-service — Moderation
    location /api/moderation {
        proxy_pass http://message-service:5003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # message-service — Socket.io (WebSocket support)
    location /socket.io {
        proxy_pass http://message-service:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check endpoints
    location /health/user {
        proxy_pass http://user-service:5001/health;
    }

    location /health/friend {
        proxy_pass http://friend-service:5002/health;
    }

    location /health/message {
        proxy_pass http://message-service:5003/health;
    }
}
